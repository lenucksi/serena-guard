# Code file extensions for which direct Read/Edit/Write/Grep/Bash is FORBIDDEN.
# Use Serena MCP tools and/or Claude LSP tools instead.
#
# Fields per entry:
#   ext         - file extension (lowercase, leading dot)
#   serena      - true if Serena MCP has full semantic support (via installed LSP server)
#   lsp_plugin  - Claude plugin ID that provides LSP for this extension, or null
#
# Plugin sources:
#   claude-plugins-official  — official Anthropic-maintained plugins (auto-available)
#   claude-code-lsps         — community collection (github.com/boostvolt/claude-code-lsps)

extensions:
  # ── TypeScript / JavaScript ──────────────────────────────────────────────
  - ext: .ts
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  - ext: .tsx
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  - ext: .d.ts
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  - ext: .js
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  - ext: .jsx
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  - ext: .mjs
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  - ext: .cjs
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  # ── Python ───────────────────────────────────────────────────────────────
  - ext: .py
    serena: true
    lsp_plugin: "pyright-lsp@claude-plugins-official"

  - ext: .pyi
    serena: true
    lsp_plugin: "pyright-lsp@claude-plugins-official"

  # ── Go ───────────────────────────────────────────────────────────────────
  - ext: .go
    serena: true
    lsp_plugin: "gopls-lsp@claude-plugins-official"

  # ── Rust ─────────────────────────────────────────────────────────────────
  - ext: .rs
    serena: true
    lsp_plugin: "rust-analyzer-lsp@claude-plugins-official"

  # ── Frontend frameworks (use TypeScript LSP) ─────────────────────────────
  - ext: .vue
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  - ext: .svelte
    serena: true
    lsp_plugin: "typescript-lsp@claude-plugins-official"

  # ── Java ─────────────────────────────────────────────────────────────────
  - ext: .java
    serena: true
    lsp_plugin: "jdtls-lsp@claude-plugins-official"

  # ── Kotlin ───────────────────────────────────────────────────────────────
  - ext: .kt
    serena: true
    lsp_plugin: "kotlin-lsp@claude-plugins-official"

  - ext: .kts
    serena: true
    lsp_plugin: "kotlin-lsp@claude-plugins-official"

  # ── Scala ────────────────────────────────────────────────────────────────
  # Serena works if a JVM LSP (e.g. metals) is installed on the system.
  # No official or community Claude LSP plugin available yet.
  - ext: .scala
    serena: true
    lsp_plugin: null

  # ── C / C++ / Objective-C ────────────────────────────────────────────────
  - ext: .c
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  - ext: .cpp
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  - ext: .cc
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  - ext: .cxx
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  - ext: .h
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  - ext: .hpp
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  - ext: .hxx
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  - ext: .m
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  - ext: .mm
    serena: true
    lsp_plugin: "clangd-lsp@claude-plugins-official"

  # ── C# ───────────────────────────────────────────────────────────────────
  - ext: .cs
    serena: true
    lsp_plugin: "csharp-lsp@claude-plugins-official"

  - ext: .csx
    serena: true
    lsp_plugin: "csharp-lsp@claude-plugins-official"

  # ── Ruby ─────────────────────────────────────────────────────────────────
  - ext: .rb
    serena: true
    lsp_plugin: "ruby-lsp@claude-plugins-official"

  - ext: .rake
    serena: true
    lsp_plugin: "ruby-lsp@claude-plugins-official"

  - ext: .gemspec
    serena: true
    lsp_plugin: "ruby-lsp@claude-plugins-official"

  - ext: .ru
    serena: true
    lsp_plugin: "ruby-lsp@claude-plugins-official"

  - ext: .erb
    serena: true
    lsp_plugin: "ruby-lsp@claude-plugins-official"

  # ── PHP ──────────────────────────────────────────────────────────────────
